<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 — 花見</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="RegisterPage.css">
</head>
<body>
  <div class="petals-container" aria-hidden="true">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  </div>

  <div class="page">
    <div class="card">
      <div class="card-header">
        <h1 class="brand">花 見</h1>
        <p class="subtitle">开启你的春日之旅</p>
      </div>

      <form class="form" id="registerForm" novalidate>
        <div class="field">
          <label class="field-label" for="username">用户名</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" class="input" placeholder="选择你的用户名" autocomplete="username" autofocus required>
          </div>
          <span class="field-error" id="usernameError"></span>
        </div>

        <div class="field">
          <label class="field-label" for="email">邮箱</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M22 4l-10 8L2 4"/>
            </svg>
            <input type="email" id="email" class="input" placeholder="输入你的邮箱地址" autocomplete="email" required>
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field">
          <label class="field-label" for="password">密码</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" class="input" placeholder="至少6位字符" autocomplete="new-password" required>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="显示密码">
              <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="field">
          <label class="field-label" for="confirmPassword">确认密码</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              <path d="m9 16 2 2 4-4"/>
            </svg>
            <input type="password" id="confirmPassword" class="input" placeholder="再次输入密码" autocomplete="new-password" required>
          </div>
          <span class="field-error" id="confirmPasswordError"></span>
        </div>

        <div class="strength-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="strengthBar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <span class="strength-text" id="strengthText" aria-live="polite"></span>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="btn-text">创建账户</span>
          <span class="btn-loader"></span>
        </button>
      </form>

      <p class="card-footer">
        已有账户？<a href="LoginPage.html" class="footer-link">返回登录 →</a>
      </p>
    </div>

    <div class="decor">
      <div class="decor-branch">
        <svg viewBox="0 0 200 300" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M100 0 Q105 50 120 100 Q140 160 110 210 Q90 240 100 300" stroke="#c49b95" stroke-width="2.5" fill="none"/>
          <path d="M120 100 Q150 80 170 100" stroke="#c49b95" stroke-width="1.8" fill="none"/>
          <path d="M110 160 Q80 145 60 155" stroke="#c49b95" stroke-width="1.8" fill="none"/>
          <path d="M105 210 Q130 195 150 205" stroke="#c49b95" stroke-width="1.5" fill="none"/>
          <circle cx="100" cy="300" r="10" fill="#f8bbd0" opacity="0.85"/>
          <circle cx="100" cy="300" r="5" fill="#f48fb1" opacity="0.9"/>
          <circle cx="170" cy="100" r="9" fill="#f8bbd0" opacity="0.8"/>
          <circle cx="170" cy="100" r="4.5" fill="#f48fb1" opacity="0.85"/>
          <circle cx="60" cy="155" r="8" fill="#fce4ec" opacity="0.8"/>
          <circle cx="150" cy="205" r="7" fill="#f8bbd0" opacity="0.75"/>
          <circle cx="110" cy="160" r="6" fill="#fce4ec" opacity="0.7"/>
          <circle cx="120" cy="100" r="7" fill="#f8bbd0" opacity="0.75"/>
        </svg>
      </div>
      <p class="decor-haiku">新しい<br>始まりの春<br>ここから</p>
    </div>
  </div>

  <script src="RegisterPage.js"></script>
</body>
</html>
